<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Acceso | Paletas para WhatsApp</title>
  <meta http-equiv="refresh" content="0;url=/cadastrar?line=paletas">
  <link rel="icon" href="/favicon.svg?v=5" type="image/svg+xml">
  <style>
    body {
      font-family: Nunito, system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; background: #fff6f9; color: #3d2228;
    }
    a { color: #ff4f8b; font-weight: 800; }
  </style>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var premium = params.get('premium') === '1';
      var pending = false;
      try {
        pending = !!sessionStorage.getItem('pending_purchase_paletas');
      } catch (e) { /* ignore */ }
      var target;
      if (pending || params.get('src') === 'hotmart' || params.get('src') === 'email') {
        target = '/cadastrar?compra=1&src=' + (params.get('src') || 'hotmart') + '&line=paletas';
        if (premium) target += '&premium=1';
      } else {
        target = '/cadastrar?line=paletas';
      }
      location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirigiendo a tu acceso… <a href="/cadastrar?line=paletas">Haz clic aquí</a> si no avanza.</p>
</body>
</html>
