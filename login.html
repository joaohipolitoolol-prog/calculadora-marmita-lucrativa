<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#E8437A">
  <title>Entrar | Paletas para WhatsApp</title>
  <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/login/login.css">
  <style>
    body.auth-checking .auth-header,
    body.auth-checking .auth-main,
    body.auth-checking .auth-footer { visibility: hidden; }
    body.auth-resolved .auth-checking-overlay { display: none; }
    .auth-checking-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff6f9;
    }
    .auth-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #f0d4de;
      border-top-color: #e8437a;
      border-radius: 50%;
      animation: auth-spin 0.7s linear infinite;
    }
    @keyframes auth-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="auth-page auth-login auth-checking">
  <div class="auth-checking-overlay" aria-hidden="true"><div class="auth-spinner"></div></div>
  <div class="auth-bg" aria-hidden="true"></div>

  <header class="auth-header">
    <a href="/" class="auth-logo">
      <img src="/favicon.svg?v=3" width="32" height="32" alt="" class="auth-logo-icon">
      <span>Paletas para WhatsApp</span>
    </a>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-card-icon" aria-hidden="true">🍓</div>
      <h1>Bienvenido de vuelta</h1>
      <p class="auth-sub">Entra con el correo y contraseña de tu cuenta.</p>

      <div id="config-alert" class="auth-alert info"></div>
      <div id="form-alert" class="auth-alert"></div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-email">Correo electrónico</label>
          <input id="login-email" name="email" type="email" autocomplete="email" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <div class="password-field">
            <input id="login-password" name="password" type="password" autocomplete="current-password" required minlength="6" placeholder="Mínimo 6 caracteres">
            <button type="button" class="password-toggle" aria-label="Mostrar contraseña" aria-pressed="false">
              <svg class="icon-eye" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="icon-eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <label class="auth-remember" for="login-remember">
          <input id="login-remember" name="remember" type="checkbox" checked>
          <span>Mantenerme conectado</span>
        </label>
        <button type="submit" class="btn btn-primary auth-submit">Entrar</button>
      </form>

      <div class="auth-links">
        <button type="button" id="forgot-btn">Olvidé mi contraseña</button>
      </div>

      <p class="auth-switch">
        ¿Primera vez aquí?
        <a href="/cadastrar">Crear cuenta</a>
      </p>
    </div>
  </main>

  <footer class="auth-footer">
    <p>¿Aún no compraste? <a href="/#oferta">Ver kit · US$ 5,97</a></p>
  </footer>

  <script type="module" src="/src/login/login.js"></script>
</body>
</html>
