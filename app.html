<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#FFF6F9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Paletas">
  <title>Mi Kit | Paletas para WhatsApp</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('app_theme_v1');
        if (t !== 'dark' && t !== 'light') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', t === 'dark' ? '#141014' : '#FFF6F9');
      } catch (e) {}
    })();
  </script>
  <link rel="icon" href="/favicon.svg?v=5" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=5">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/app/app-base.css">
  <link rel="stylesheet" href="/src/app/app.css">
</head>
<body>
  <div id="app-root"></div>
  <div id="toast" class="toast"></div>
  <script type="module" src="/src/app/main.js"></script>
</body>
</html>
