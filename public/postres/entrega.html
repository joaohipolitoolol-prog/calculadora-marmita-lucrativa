<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Acceso al kit | Postres en Vaso</title>
<link rel="icon" href="/favicon.svg?v=5" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --rosa: #EC3F7A; --crema: #FFF4E6; --chocolate: #5C2E1F; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background: linear-gradient(160deg, var(--crema), #FFE8F0 55%);
  min-height: 100vh;
  color: var(--chocolate);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.box {
  max-width: 420px;
  text-align: center;
  background: #fff;
  border-radius: 20px;
  padding: 32px 24px;
  box-shadow: 0 8px 28px rgba(92,46,31,0.08);
}
h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
p { font-size: 15px; color: #6B5E57; line-height: 1.5; margin-bottom: 20px; }
a.btn {
  display: inline-block;
  background: var(--rosa);
  color: #fff;
  font-weight: 800;
  text-decoration: none;
  padding: 14px 24px;
  border-radius: 999px;
}
a.secondary { display: block; margin-top: 14px; color: var(--rosa); font-weight: 700; font-size: 14px; }
</style>
<script>
(function () {
  var pending = false;
  try { pending = !!sessionStorage.getItem('pending_purchase_postres'); } catch (e) {}
  if (pending) {
    location.replace('/postres/cadastrar?compra=1&src=hotmart&line=postres&postres=1');
  }
})();
</script>
</head>
<body>
  <div class="box">
    <h1>Entra a tu kit</h1>
    <p>El contenido completo está en el área de miembros. Inicia sesión o crea tu cuenta con el correo de la compra.</p>
    <a class="btn" href="/postres/login">Iniciar sesión</a>
    <a class="secondary" href="/postres/cadastrar?line=postres">Crear cuenta</a>
  </div>
</body>
</html>
